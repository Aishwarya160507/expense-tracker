<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <!-- REGISTER -->
    <div class="card">
        <h2>Register</h2>
        <input id="regEmail" placeholder="Enter Email">
        <input id="regPassword" type="password" placeholder="Enter Password">
        <button onclick="register()">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="card">
        <h2>Login</h2>
        <input id="loginEmail" placeholder="Enter Email">
        <input id="loginPassword" type="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- EXPENSE APP -->
    <div id="app" class="card" style="display:none;">
        <h2>Add Expense</h2>

        <input id="title" placeholder="Title">
        <input id="amount" type="number" placeholder="Amount">
        <input id="category" placeholder="Category">
        <input id="date" type="date">

        <button onclick="addExpense()">Add Expense</button>

        <h3>Your Expenses</h3>
        <ul id="list"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
